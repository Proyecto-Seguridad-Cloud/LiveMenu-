name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check backend/

  test-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q

      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile.prod -t livemenu-test:latest .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v2
        with:
          image-ref: livemenu-test:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  build-and-publish:
    needs: [lint, test-and-scan]
    runs-on: ubuntu-latest
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main'"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        run: |
          docker build -f backend/Dockerfile.prod -t ${{ secrets.DOCKERHUB_USERNAME }}/livemenu:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/livemenu:latest

      - name: Publish skipped
        if: !secrets.DOCKERHUB_USERNAME || !secrets.DOCKERHUB_TOKEN
        run: echo "No registry credentials configured; skip publish"