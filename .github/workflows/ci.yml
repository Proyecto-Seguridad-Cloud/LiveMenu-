name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check backend/

  test-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q

      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile.prod -t livemenu-test:latest .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v2
        with:
          image-ref: livemenu-test:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  build-and-publish:
    needs: [lint, test-and-scan]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry (if credentials available)
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "No registry credentials configured; skipping login"
          else
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          fi

      - name: Build and push (if credentials available)
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "No registry credentials configured; skipping publish"
          else
            docker build -f backend/Dockerfile.prod -t ${{ secrets.DOCKERHUB_USERNAME }}/livemenu:latest .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/livemenu:latest
          fi