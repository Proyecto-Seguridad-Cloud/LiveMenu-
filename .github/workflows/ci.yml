name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check backend/

  test-and-scan:
    runs-on: ubuntu-latest
    env:
      DB_USER: livemenu
      DB_PASSWORD: livemenu
      DB_NAME: livemenudb
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      JWT_SECRET_KEY: testsecretkeyforci
      STORAGE_PROVIDER: local
      UPLOAD_DIR: uploads
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: livemenu
          POSTGRES_PASSWORD: livemenu
          POSTGRES_DB: livemenudb
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "Postgres is up"
              break
            fi
            echo "Postgres not ready yet..."
            sleep 1
          done

      - name: Run DB migrations
        working-directory: backend
        run: |
          alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q

      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile.prod -t livemenu-test:latest backend

      - name: Install Trivy CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin latest
          trivy --version

      - name: Run Trivy image scan
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format table livemenu-test:latest

  build-and-publish:
    needs: [lint, test-and-scan]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry (if credentials available)
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "No registry credentials configured; skipping login"
          else
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          fi

      - name: Build and push (if credentials available)
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "No registry credentials configured; skipping publish"
          else
            docker build -f backend/Dockerfile.prod -t ${{ secrets.DOCKERHUB_USERNAME }}/livemenu:latest backend
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/livemenu:latest
          fi