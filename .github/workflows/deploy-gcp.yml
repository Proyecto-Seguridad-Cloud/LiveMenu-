name: Deploy to GCP

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GCP secrets
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ] || [ -z "${{ secrets.GCP_PROJECT }}" ] || [ -z "${{ secrets.GCP_REGION }}" ]; then
            echo "GCP secrets not configured (GCP_SA_KEY,GCP_PROJECT,GCP_REGION). Failing.";
            exit 1;
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          export_default_credentials: true

      - name: Ensure Artifact Registry repo exists
        run: |
          PROJECT=${{ secrets.GCP_PROJECT }}
          LOCATION=${{ secrets.GCP_REGION }}
          REPO=livemenu-repo
          # create will fail if exists; ignore error
          gcloud artifacts repositories create "$REPO" \
            --repository-format=docker --location="$LOCATION" --project="$PROJECT" || true

      - name: Check Alembic migrations (single head)
        run: |
          python - <<'PY'
          import ast, os, sys

          path = 'backend/alembic/versions'
          files = [f for f in os.listdir(path) if f.endswith('.py')]

          def extract_revision_info(text):
            tree = ast.parse(text)
            rev = None
            down = None
            for node in tree.body:
              if isinstance(node, ast.Assign):
                for target in node.targets:
                  if getattr(target, 'id', None) == 'revision':
                    if isinstance(node.value, ast.Constant):
                      rev = str(node.value.value)
                  if getattr(target, 'id', None) == 'down_revision':
                    val = node.value
                    if isinstance(val, ast.Constant):
                      down = val.value
                    elif isinstance(val, (ast.Tuple, ast.List)):
                      parts = []
                      for elt in val.elts:
                        if isinstance(elt, ast.Constant):
                          parts.append(str(elt.value))
                      down = tuple(parts)
            return rev, down

          revisions = {}
          for fn in files:
            txt = open(os.path.join(path, fn), 'r', encoding='utf-8').read()
            rev, down = extract_revision_info(txt)
            if rev:
              revisions[rev] = down

          # build children set
          children = set()
          for v in revisions.values():
            if v is None:
              continue
            if isinstance(v, (list, tuple)):
              children.update(v)
            else:
              children.add(v)

          heads = [r for r in revisions.keys() if r not in children]
          if len(heads) > 1:
            print(f"ERROR: Multiple alembic heads detected: {heads}")
            sys.exit(2)
          print('Alembic heads OK:', heads)
          PY

      - name: Configure docker for Artifact Registry
        run: |
          LOCATION=${{ secrets.GCP_REGION }}
          gcloud auth configure-docker --quiet ${LOCATION}-docker.pkg.dev

      - name: Build Docker image
        run: |
          PROJECT=${{ secrets.GCP_PROJECT }}
          LOCATION=${{ secrets.GCP_REGION }}
          REPO=livemenu-repo
          IMAGE=${{ github.sha }}
          docker build -t ${LOCATION}-docker.pkg.dev/${PROJECT}/${REPO}/livemenu-backend:${IMAGE} -f backend/Dockerfile.prod backend

      - name: Push image to Artifact Registry
        run: |
          PROJECT=${{ secrets.GCP_PROJECT }}
          LOCATION=${{ secrets.GCP_REGION }}
          REPO=livemenu-repo
          IMAGE=${{ github.sha }}
          docker push ${LOCATION}-docker.pkg.dev/${PROJECT}/${REPO}/livemenu-backend:${IMAGE}

      - name: Deploy to Cloud Run
        run: |
          PROJECT=${{ secrets.GCP_PROJECT }}
          LOCATION=${{ secrets.GCP_REGION }}
          REGION=${{ secrets.GCP_REGION }}
          SERVICE=livemenu-backend
          IMAGE=${LOCATION}-docker.pkg.dev/${PROJECT}/livemenu-repo/livemenu-backend:${{ github.sha }}
          # Map secrets from Secret Manager to environment variables in Cloud Run
          gcloud run deploy $SERVICE \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --project "$PROJECT" \
            --set-secrets DB_USER=db-user:latest,DB_PASSWORD=db-password:latest,DB_NAME=db-name:latest,DB_HOST=db-host:latest,JWT_SECRET_KEY=jwt-secret:latest

      - name: Smoke test service
        run: |
          PROJECT=${{ secrets.GCP_PROJECT }}
          REGION=${{ secrets.GCP_REGION }}
          SERVICE=livemenu-backend
          URL=$(gcloud run services describe $SERVICE --region $REGION --project $PROJECT --format='value(status.url)')
          echo "Service URL: $URL"
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" $URL/health || true)
            echo "health status: $HTTP"
            if [ "$HTTP" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed"; exit 1
